<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redmun Lead Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Redmun Lead Generator</h1>
            <p>Find and analyze local business leads with AI-powered personalized pitches</p>
        </header>

        <main>
            <section class="input-section">
                <form id="leadForm">
                    <div class="form-group">
                        <label for="location">📍 Location</label>
                        <input 
                            type="text" 
                            id="location" 
                            name="location" 
                            placeholder="e.g., Cardiff, London, New York"
                            value="Cardiff"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="industry">🏢 Industry</label>
                        <input 
                            type="text" 
                            id="industry" 
                            name="industry" 
                            placeholder="e.g., restaurants, hotels, fitness"
                            value="restaurants"
                            required
                        >
                    </div>

                    <button type="submit" id="submitBtn" class="btn-primary">Generate Leads</button>
                </form>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2>📊 Results</h2>
                    <div class="results-controls">
                        <span id="resultCount" class="result-count">0 leads found</span>
                        <button id="downloadBtn" class="btn-secondary hidden">📥 Download CSV</button>
                    </div>
                </div>

                <div id="progressContainer" class="progress-container hidden">
                    <div class="progress-bar-wrapper">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <p id="progressText" class="progress-text">Starting analysis...</p>
                </div>

                <div id="leadsContainer" class="leads-container"></div>

                <div id="errorMessage" class="error-message hidden"></div>
            </section>
        </main>

        <footer>
            <p>Redmun Lead Generator • Powered by Gemini AI & SerpAPI</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
